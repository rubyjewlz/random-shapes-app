<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Shape Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    #shape-container {
      width: 300px;
      height: 300px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ccc;
    }

    #shape-container img {
      max-width: 100%;
      max-height: 100%;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Random Shape Generator</h1>

  <div id="shape-container">
    <img id="shape-image" src="shapes/shape1.svg" alt="Random shape" />
  </div>

  <button id="random-btn">Show Random Shape</button>

  <script>
    const shapeImage = document.getElementById("shape-image");
    const button = document.getElementById("random-btn");

    button.addEventListener("click", () => {
      const randomNumber = Math.floor(Math.random() * 36) + 1;
      shapeImage.src = `shapes/shape${randomNumber}.svg`;
      shapeImage.alt = `Shape ${randomNumber}`;
    });
  </script>
</body>
</html>
